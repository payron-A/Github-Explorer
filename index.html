<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Explorer</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <img src="images/PayronLogo.png ">
                <div>
                    <h1>Github Explorer</h1>
                    <a href="https://github.com/payron-A">Github Account</a>
                </div>
            </div>
            <div class="header-text">
                <p>Search any Github user and explore their repositories with smart filtering and fast search</p>
            </div>
            <div class="header-search search">
                <label for="headerSearchIpt"><i class="fa-brands fa-sistrix"></i></label>
                <input type="search"id="headerSearchIpt" placeholder="Search Github username...">
                <button class="header-search-btn search-button">Search</button>
            </div>
        </header>
        <section class="github-card">
        </section>
        <section class="github-repos">
            <div class="search" id="searchRepos">
                <i class="fa-brands fa-sistrix"></i>
                <input type="text" placeholder="Search Github repository...">
            </div>
            <div class="filter-repos">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Most starred</button>
            </div>
            <div class="repo-main">
                <div class="repo-card">
                    <div class="repo-head">
                        <div class="repo-name">
                            <i class="fa-solid fa-folder-closed"></i>
                            <h3>iris.c</h3>
                        </div>
                        <div class="repo-type">public</div>
                    </div>
                    <div class="repo-bio">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aliquid, quia.</div>
                    <div class="repo-footer">
                        <div class="repo-language">
                            <i class="fa-solid fa-circle"style="color:white"></i>
                            <p>C</p>
                        </div>
                        <div class="repo-stars">
                            <i class="fa-solid fa-star"></i>
                            <p>34k</p>
                        </div>
                        <div class="repo-work">
                            <i class="fa-solid fa-clock"></i>
                            <p>3mo ago</p>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
