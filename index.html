<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Explorer</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <img src="images/PayronLogo.png ">
                <div>
                    <h1>Github Explorer</h1>
                    <a href="https://github.com/payron-A">Github Account</a>
                </div>
            </div>
            <div class="header-text">
                <p>Search any Github user and explore their repositories with smart filtering and fast search</p>
            </div>
            <div class="header-search search">
                <label for="headerSearchIpt"><i class="fa-brands fa-sistrix"></i></label>
                <input type="search"id="headerSearchIpt" placeholder="Search Github username...">
                <button class="header-search-btn search-button">
                    <i class="fa-brands fa-sistrix"></i>
                    Search
                </button>
            </div>
        </header>
        <section class="github-card"></section>
        <section class="github-repos">
            <div class="search" >
                <i class="fa-brands fa-sistrix"></i>
                <input type="search" id="searchRepos" placeholder="Search Github repository...">
            </div>
            <div class="filter-repos">
                <button class="filter-btn active" data-searchType="all">All</button>
                <button class="filter-btn"data-searchType="starred">Most starred</button>
            </div>
            <div class="repo-main">
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
